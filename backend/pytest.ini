[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short test summary info for failures and errors
addopts =
    -v
    --tb=short
    --cov=.
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-omit=tests/*,alembic/*,*/__pycache__/*,*/migrations/*
    -p no:warnings

# Async support
asyncio_mode = auto
